<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Control System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #0f1e1c, #002724 90%);
            color: #eee;
        }

        .container {
            position: relative;
            background: #0c1a17;
            border-radius: 16px;
            width: 420px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.5);
        }

        /* shine overlay */
        .container::before {
            content: "";
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: linear-gradient( 45deg,
            rgba(255,255,255,0.05) 0%,
            rgba(255,255,255,0.2) 50%,
            rgba(255,255,255,0.05) 100%);
            transform: rotate(-25deg) translate(-50%, -50%);
            animation: shine 6s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { transform: rotate(-25deg) translate(-50%, -50%); opacity: 0.2; }
            50% { transform: rotate(-25deg) translate(50%, 50%); opacity: 0.6; }
            100% { transform: rotate(-25deg) translate(-50%, -50%); opacity: 0.2; }
        }

        .tabs {
            display: flex;
            background: linear-gradient(135deg, #005d50, #008f78);
            border-bottom: 2px solid #00bfa5;
        }

        .tabs button {
            flex: 1;
            padding: 16px;
            border: none;
            background: transparent;
            color: #e0f8f5;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.3s, color 0.3s;
        }

        .tabs button:hover {
            color: #ffffff;
            background: rgba(0,0,0,0.2);
        }

        .tabs button.active {
            background: rgba(255,255,255,0.12);
            color: #ffffff;
            font-weight: 700;
        }

        .tab-content {
            padding: 35px 30px;
            display: none;
            color: #eafaf8;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-content h2 {
            margin-bottom: 20px;
            color: #00bfa5;
            text-align: center;
            text-shadow: 0 0 8px rgba(0, 191, 165, 0.6);
        }

        .tab-content input,
        .tab-content select {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border: none;
            border-radius: 10px;
            background: #0f2a25;
            color: #cef7f1;
            font-size: 15px;
            outline: none;
            transition: box-shadow 0.3s, background 0.3s;
        }

        .tab-content input:focus,
        .tab-content select:focus {
            box-shadow: 0 0 8px rgba(0,191,165,0.5);
            background: #0d3a33;
        }

        .tab-content button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00bfa5, #00e4c3);
            color: #0a1d1a;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 6px 20px rgba(0, 191, 165, 0.4);
        }

        .tab-content button:hover {
            background: linear-gradient(135deg, #00e4c3, #00bfa5);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 191, 165, 0.5);
        }

        .alert {
            text-align: center;
            margin-bottom: 12px;
            color: #ff8370;
            display: none;
            font-weight: 500;
            letter-spacing: 0.5px;
        }




    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="registerTab">Register</button>
    </div>

    <div id="login" class="tab-content active">
        <h2>Login</h2>
        <div class="alert" id="loginAlert"></div>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Пароль" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <div id="register" class="tab-content">
        <h2>Register</h2>
        <div class="alert" id="registerAlert"></div>
        <form id="registerForm">
            <input type="text" id="regName" placeholder="Полное имя" required>
            <input type="text" id="regFaculty" placeholder="Факультет" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPassword" placeholder="Пароль" required>
            <select id="regRole" required>
                <option value="" disabled selected>Роль</option>
                <option value="STUDENT">STUDENT</option>
                <option value="TEACHER">TEACHER</option>
            </select>
            <button type="submit">Register</button>
        </form>
    </div>
</div>
<script>
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginDiv = document.getElementById('login');
    const registerDiv = document.getElementById('register');

    loginTab.addEventListener('click', () => {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginDiv.classList.add('active');
        registerDiv.classList.remove('active');
    });

    registerTab.addEventListener('click', () => {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerDiv.classList.add('active');
        loginDiv.classList.remove('active');
    });

    // --- Логин ---
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const alertBox = document.getElementById('loginAlert');

        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        try {
            const response = await fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (!response.ok) {
                const errText = await response.text();
                alertBox.style.display = 'block';
                alertBox.style.color = '#ff8370';
                alertBox.innerText = 'Ошибка логина: ' + errText;
                return;
            }

            const data = await response.json();

            // Сохраняем данные в localStorage
            localStorage.setItem('userId', data.userId);
            localStorage.setItem('userName', data.name);
            localStorage.setItem('userRole', data.role);
            if (data.token) localStorage.setItem('token', data.token);

            // Редирект по роли
            if (data.role === 'STUDENT') {
                window.location.href = '/main.html';
            } else if (data.role === 'TEACHER') {
                window.location.href = '/admin_panel.html';
            } else {
                // На случай неизвестной роли
                alertBox.style.display = 'block';
                alertBox.style.color = '#ff8370';
                alertBox.innerText = 'Неизвестная роль: ' + data.role;
            }

        } catch (err) {
            console.error(err);
            alertBox.style.display = 'block';
            alertBox.style.color = '#ff8370';
            alertBox.innerText = 'Произошла ошибка при логине';
        }
    });



    // --- Регистрация ---
    document.getElementById('registerForm').addEventListener('submit', function(e){
        e.preventDefault();
        const alertBox = document.getElementById('registerAlert');

        fetch('/api/users/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('regName').value,
                faculty: document.getElementById('regFaculty').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                role: document.getElementById('regRole').value
            })
        })
            .then(res => {
                if (!res.ok) throw new Error('Ошибка регистрации');
                return res.json();
            })
            .then(data => {
                alertBox.style.display = 'block';
                alertBox.style.color = '#7cffd2';
                alertBox.innerText = 'Registration successful!';
            })
            .catch(err => {
                alertBox.style.display = 'block';
                alertBox.style.color = '#ff8370';
                alertBox.innerText = 'Registration failed!';
            });
    });
</script>

</body>
</html>
