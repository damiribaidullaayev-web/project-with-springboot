<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Exams</title>
    <link rel="icon" href="favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #00e6b8, #009f88, #003a34);
            min-height: 100vh;
            padding: 40px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0,255,200,0.7);
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,255,200,0.4);
            animation: fadeIn 0.7s ease;
        }

        label {
            margin-top: 15px;
            font-weight: 500;
            display: block;
            text-shadow: 0 0 10px rgba(0,255,200,0.5);
        }

        input, select, textarea {
            width: 100%;
            margin-top: 6px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(0,0,0,0.3);
            outline: none;
            color: white;
            font-size: 14px;
            box-shadow: inset 0 0 10px rgba(0,255,200,0.3);
        }

        textarea {
            resize: none;
        }

        .btn {
            margin-top: 15px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #00ffd0, #00a68b);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: black;
            box-shadow: 0 0 12px rgba(0,255,200,0.6);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(0,255,200,1);
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff4f4f, #cc0000);
            color: white;
            box-shadow: 0 0 12px rgba(255,80,80,0.6);
        }

        .delete-btn:hover {
            box-shadow: 0 0 18px rgba(255,50,50,1);
        }

        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.7s ease;
        }

        th, td {
            padding: 12px;
            color: white;
        }

        th {
            background: rgba(0, 255, 200, 0.25);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(0,255,200,0.2);
            transition: 0.2s;
        }

        .alert {
            text-align: center;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.5s ease;
        }

        .alert.success {
            background: rgba(0,255,150,0.4);
            color: #003a34;
            box-shadow: 0 0 12px rgba(0,255,200,0.7);
        }

        .alert.error {
            background: rgba(255,80,80,0.4);
            color: white;
            box-shadow: 0 0 12px rgba(255,50,50,0.7);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: rgba(0,0,0,0.85);
            padding: 25px;
            border-radius: 15px;
            width: 500px;
            position: relative;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>
<body>
<h1>MCQ Exams</h1>
<div class="container">

    <div class="alert" id="alert"></div>

    <button class="btn" onclick="openModal()">Add Exam</button>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Subject ID</th>
            <th>Title</th>
            <th>Time Limit</th>
            <th>Randomization</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="examTableBody">
        <!-- Exams will be dynamically loaded here -->
        </tbody>
    </table>
</div>

<!-- Modal for Add/Edit -->
<div class="modal" id="examModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle">Add Exam</h2>
        <label>Subject ID</label>
        <input type="number" id="subjectId" placeholder="Enter Subject ID">
        <label>Title</label>
        <input type="text" id="title" placeholder="Enter Exam Title">
        <label>Time Limit (minutes)</label>
        <input type="number" id="timeLimit" placeholder="Enter Time Limit">
        <label>Randomization (Y/N)</label>
        <select id="randomization">
            <option value="Y">Yes</option>
            <option value="N">No</option>
        </select>
        <label>Description</label>
        <textarea id="description" rows="4" placeholder="Enter Description"></textarea>
        <button class="btn" id="saveBtn">Save</button>
    </div>
</div>

<script>
    let exams = [];
    let editId = null;

    const alertBox = document.getElementById('alert');
    const modal = document.getElementById('examModal');

    const subjectInput = document.getElementById('subjectId');
    const titleInput = document.getElementById('title');
    const timeLimitInput = document.getElementById('timeLimit');
    const randomInput = document.getElementById('randomization');
    const descriptionInput = document.getElementById('description');

    const tableBody = document.getElementById('examTableBody');
    const saveBtn = document.getElementById('saveBtn');

    function showAlert(message, type='success') {
        alertBox.textContent = message;
        alertBox.className = 'alert ' + type;
        alertBox.style.display = 'block';
        setTimeout(()=> alertBox.style.display='none', 2500);
    }

    function openModal(edit=null) {
        modal.style.display = 'flex';
        if(edit) {
            editId = edit.examId;
            document.getElementById('modalTitle').innerText = 'Edit Exam';
            subjectInput.value = edit.subjectId;
            titleInput.value = edit.title;
            timeLimitInput.value = edit.timeLimit;
            randomInput.value = edit.randomization;
            descriptionInput.value = edit.description;
        } else {
            editId = null;
            document.getElementById('modalTitle').innerText = 'Add Exam';
            subjectInput.value = '';
            titleInput.value = '';
            timeLimitInput.value = '';
            randomInput.value = 'Y';
            descriptionInput.value = '';
        }
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    async function fetchExams() {
        try {
            const res = await fetch('/api/exams');
            exams = await res.json();
            renderTable();
        } catch(e) {
            showAlert('Failed to fetch exams', 'error');
        }
    }

    function renderTable() {
        tableBody.innerHTML = '';
        exams.forEach(exam => {
            const row = document.createElement('tr');
            row.innerHTML = `
                    <td>${exam.examId}</td>
                    <td>${exam.subjectId}</td>
                    <td>${exam.title}</td>
                    <td>${exam.timeLimit || ''}</td>
                    <td>${exam.randomization}</td>
                    <td>${exam.description || ''}</td>
                    <td>
                        <button class="btn" onclick='openModal(${JSON.stringify(exam)})'>Edit</button>
                        <button class="delete-btn" onclick='deleteExam(${exam.examId})'>Delete</button>
                    </td>
                `;
            tableBody.appendChild(row);
        });
    }

    async function saveExam() {
        const data = {
            subjectId: Number(subjectInput.value),
            title: titleInput.value,
            timeLimit: Number(timeLimitInput.value),
            randomization: randomInput.value,
            description: descriptionInput.value
        };

        try {
            if(editId) {
                const res = await fetch(`/api/exams/${editId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(!res.ok) throw new Error(await res.text());
                showAlert('Exam updated successfully');
            } else {
                const res = await fetch('/api/exams', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(!res.ok) throw new Error(await res.text());
                showAlert('Exam added successfully');
            }
            closeModal();
            fetchExams();
        } catch(e) {
            showAlert(e.message, 'error');
        }
    }

    async function deleteExam(id) {
        if(!confirm('Are you sure you want to delete this exam?')) return;
        try {
            const res = await fetch(`/api/exams/${id}`, { method: 'DELETE' });
            if(!res.ok) throw new Error(await res.text());
            showAlert('Exam deleted successfully');
            fetchExams();
        } catch(e) {
            showAlert(e.message, 'error');
        }
    }

    saveBtn.addEventListener('click', saveExam);
    window.addEventListener('load', fetchExams);
    window.addEventListener('click', e => { if(e.target===modal) closeModal(); });
</script>
</body>
</html>
