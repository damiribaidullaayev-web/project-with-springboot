<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Questions Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #00e6b8, #009f88, #003a34);
            min-height: 100vh;
            padding: 40px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0,255,200,0.7);
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,255,200,0.4);
            animation: fadeIn 0.7s ease;
        }

        label {
            margin-top: 15px;
            font-weight: 500;
            display: block;
            text-shadow: 0 0 10px rgba(0,255,200,0.5);
        }

        input, select {
            width: 100%;
            margin-top: 6px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(0,0,0,0.3);
            outline: none;
            color: white;
            font-size: 14px;
            box-shadow: inset 0 0 10px rgba(0,255,200,0.3);
        }

        .btn {
            margin-top: 15px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #00ffd0, #00a68b);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: black;
            box-shadow: 0 0 12px rgba(0,255,200,0.6);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(0,255,200,1);
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff4f4f, #cc0000);
            color: white;
            box-shadow: 0 0 12px rgba(255,80,80,0.6);
        }

        .delete-btn:hover {
            box-shadow: 0 0 18px rgba(255,50,50,1);
        }

        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.7s ease;
        }

        th, td {
            padding: 12px;
            color: white;
            text-align: left;
        }

        th {
            background: rgba(0, 255, 200, 0.25);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(0,255,200,0.2);
            transition: 0.2s;
        }

        .alert {
            text-align: center;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.5s ease;
        }

        .alert.success {
            background: rgba(0,255,150,0.4);
            color: #003a34;
            box-shadow: 0 0 12px rgba(0,255,200,0.7);
        }

        .alert.error {
            background: rgba(255,80,80,0.4);
            color: white;
            box-shadow: 0 0 12px rgba(255,50,50,0.7);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<h1>Exam Questions Management</h1>
<div class="container">

    <div class="alert" id="alert"></div>

    <form id="examQuestionForm">
        <label for="examId">Exam ID</label>
        <input type="number" id="examId" required>

        <label for="questionId">Question ID</label>
        <input type="number" id="questionId" required>

        <label for="orderIndex">Order Index</label>
        <input type="number" id="orderIndex" required>

        <button type="submit" class="btn">Add / Update</button>
    </form>

    <table>
        <thead>
        <tr>
            <th>Exam ID</th>
            <th>Question ID</th>
            <th>Order Index</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="examQuestionsTable"></tbody>
    </table>
</div>

<script>
    const alertBox = document.getElementById('alert');
    const tableBody = document.getElementById('examQuestionsTable');
    const form = document.getElementById('examQuestionForm');

    const apiBase = '/api/exam-questions';

    function showAlert(message, type='success') {
        alertBox.innerText = message;
        alertBox.className = 'alert ' + type;
        alertBox.style.display = 'block';
        setTimeout(() => alertBox.style.display = 'none', 3000);
    }

    async function fetchExamQuestions() {
        const res = await fetch(apiBase);
        const data = await res.json();
        tableBody.innerHTML = '';
        data.forEach(eq => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                    <td>${eq.examId}</td>
                    <td>${eq.questionId}</td>
                    <td>${eq.orderIndex || ''}</td>
                    <td>
                        <button class="btn delete-btn" onclick="deleteExamQuestion(${eq.examId}, ${eq.questionId})">Delete</button>
                    </td>
                `;
            tableBody.appendChild(tr);
        });
    }

    async function deleteExamQuestion(examId, questionId) {
        const res = await fetch(`${apiBase}/${examId}/${questionId}`, { method: 'DELETE' });
        if(res.ok) {
            showAlert('Deleted successfully', 'success');
            fetchExamQuestions();
        } else {
            const err = await res.text();
            showAlert(err, 'error');
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            examId: Number(document.getElementById('examId').value),
            questionId: Number(document.getElementById('questionId').value),
            orderIndex: Number(document.getElementById('orderIndex').value)
        };

        // Try to update first
        let res = await fetch(apiBase, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if(res.ok) {
            showAlert('Updated successfully', 'success');
        } else {
            // If update fails, try add
            res = await fetch(apiBase, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                showAlert('Added successfully', 'success');
            } else {
                const err = await res.text();
                showAlert(err, 'error');
            }
        }

        form.reset();
        fetchExamQuestions();
    });

    // Initial load
    fetchExamQuestions();
</script>
</body>
</html>
