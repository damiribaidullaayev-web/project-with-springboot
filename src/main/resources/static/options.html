<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Options Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif;}
        body { background: radial-gradient(circle at top left, #00e6b8, #009f88, #003a34); min-height:100vh; padding:40px; color:white; }
        h1 { text-align:center; margin-bottom:25px; text-shadow:0 0 10px rgba(0,255,200,0.7);}
        .container { max-width:900px; margin:auto; background:rgba(255,255,255,0.1); backdrop-filter:blur(12px); padding:30px; border-radius:20px; box-shadow:0 0 40px rgba(0,255,200,0.4); animation:fadeIn 0.7s ease; }
        label { margin-top:15px; font-weight:500; display:block; text-shadow:0 0 10px rgba(0,255,200,0.5); }
        input, select { width:100%; margin-top:6px; padding:12px; border-radius:10px; border:none; background:rgba(0,0,0,0.3); outline:none; color:white; font-size:14px; box-shadow:inset 0 0 10px rgba(0,255,200,0.3); }
        .btn { margin-top:15px; padding:12px 20px; background:linear-gradient(135deg, #00ffd0, #00a68b); border:none; border-radius:10px; cursor:pointer; font-weight:600; color:black; box-shadow:0 0 12px rgba(0,255,200,0.6); transition:0.3s;}
        .btn:hover { transform:scale(1.05); box-shadow:0 0 18px rgba(0,255,200,1);}
        .delete-btn { background: linear-gradient(135deg, #ff4f4f, #cc0000); color:white; box-shadow:0 0 12px rgba(255,80,80,0.6);}
        .delete-btn:hover { box-shadow:0 0 18px rgba(255,50,50,1);}
        table { width:100%; margin-top:25px; border-collapse:collapse; overflow:hidden; border-radius:12px; background:rgba(255,255,255,0.12); backdrop-filter:blur(10px); animation:fadeIn 0.7s ease;}
        th, td { padding:12px; color:white; text-align:center; }
        th { background: rgba(0, 255, 200, 0.25); font-weight:600;}
        tr:hover { background: rgba(0,255,200,0.2); transition:0.2s;}
        .alert { text-align:center; padding:12px; margin-bottom:15px; border-radius:10px; font-weight:600; display:none; backdrop-filter:blur(8px); animation:fadeIn 0.5s ease;}
        .alert.success { background: rgba(0,255,150,0.4); color:#003a34; box-shadow:0 0 12px rgba(0,255,200,0.7);}
        .alert.error { background: rgba(255,80,80,0.4); color:white; box-shadow:0 0 12px rgba(255,50,50,0.7);}
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }

        /* Модальное окно */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; }
        .modal-content { background:rgba(255,255,255,0.1); padding:25px; border-radius:15px; width:400px; backdrop-filter:blur(12px); box-shadow:0 0 20px rgba(0,255,200,0.5); animation:fadeIn 0.5s ease; }
        .modal-header { font-weight:600; margin-bottom:15px; font-size:18px; text-align:center; }
        .modal-actions { text-align:right; margin-top:15px; }
    </style>
</head>
<body>

<h1>Options Management</h1>

<div class="container">
    <div class="alert" id="alert"></div>

    <label for="questionSelect">Выберите вопрос</label>
    <select id="questionSelect"></select>

    <label>Текст варианта</label>
    <input type="text" id="optionText" placeholder="Введите вариант">
    <label>Верный</label>
    <select id="isCorrect">
        <option value="Y">Да</option>
        <option value="N">Нет</option>
    </select>
    <button class="btn" onclick="addOption()">Добавить вариант</button>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Вопрос ID</th>
            <th>Текст варианта</th>
            <th>Верный</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody id="optionsTable"></tbody>
    </table>
</div>

<!-- Модальное окно редактирования -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">Редактировать вариант</div>
        <label>Текст варианта</label>
        <input type="text" id="editOptionText">
        <label>Верный</label>
        <select id="editIsCorrect">
            <option value="Y">Да</option>
            <option value="N">Нет</option>
        </select>
        <div class="modal-actions">
            <button class="btn" onclick="saveEdit()">Сохранить</button>
            <button class="btn delete-btn" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<script>
    let selectedQuestionId = null;
    let editingOptionId = null;

    const alertBox = document.getElementById('alert');

    function showAlert(msg, type='success') {
        alertBox.textContent = msg;
        alertBox.className = 'alert ' + type;
        alertBox.style.display = 'block';
        setTimeout(()=> alertBox.style.display='none', 3000);
    }

    async function loadQuestions() {
        try {
            const res = await fetch('/api/questions');
            const questions = await res.json();
            const select = document.getElementById('questionSelect');
            select.innerHTML = '';
            questions.forEach(q=>{
                const opt = document.createElement('option');
                opt.value = q.questionId;
                opt.textContent = q.questionText;
                select.appendChild(opt);
            });
            if(questions.length>0) {
                selectedQuestionId = questions[0].questionId;
                loadOptions(selectedQuestionId);
            }
        } catch(err) {
            showAlert('Ошибка загрузки вопросов', 'error');
        }
    }

    document.getElementById('questionSelect').addEventListener('change', function(){
        selectedQuestionId = this.value;
        loadOptions(selectedQuestionId);
    });

    async function loadOptions(questionId) {
        try {
            const res = await fetch(`/api/options/question/${questionId}`);
            const options = await res.json();
            const tbody = document.getElementById('optionsTable');
            tbody.innerHTML='';
            options.forEach(o=>{
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${o.optionId}</td>
                    <td>${o.questionId}</td>
                    <td>${o.optionText}</td>
                    <td>${o.isCorrect}</td>
                    <td>
                        <button class="btn" onclick="openEditModal(${o.optionId},'${o.optionText}','${o.isCorrect}')">Изменить</button>
                        <button class="btn delete-btn" onclick="deleteOption(${o.optionId})">Удалить</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch(err) {
            showAlert('Ошибка загрузки вариантов','error');
        }
    }

    async function addOption() {
        const text = document.getElementById('optionText').value;
        const correct = document.getElementById('isCorrect').value;
        if(!text || !selectedQuestionId) return showAlert('Введите текст и выберите вопрос','error');

        try {
            const res = await fetch('/api/options', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({questionId:selectedQuestionId, optionText:text, isCorrect:correct})
            });
            if(res.ok) {
                document.getElementById('optionText').value='';
                loadOptions(selectedQuestionId);
                showAlert('Вариант добавлен');
            } else {
                const err = await res.text();
                showAlert(err,'error');
            }
        } catch(err){
            showAlert('Ошибка добавления','error');
        }
    }

    function openEditModal(id, text, correct){
        editingOptionId = id;
        document.getElementById('editOptionText').value = text;
        document.getElementById('editIsCorrect').value = correct;
        document.getElementById('editModal').style.display='flex';
    }

    function closeModal(){
        document.getElementById('editModal').style.display='none';
    }

    async function saveEdit(){
        const text = document.getElementById('editOptionText').value;
        const correct = document.getElementById('editIsCorrect').value;
        if(!text) return showAlert('Введите текст','error');

        try{
            const res = await fetch(`/api/options/${editingOptionId}`,{
                method:'PUT',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({questionId:selectedQuestionId, optionText:text, isCorrect:correct})
            });
            if(res.ok){
                loadOptions(selectedQuestionId);
                showAlert('Вариант обновлен');
                closeModal();
            } else {
                const err = await res.text();
                showAlert(err,'error');
            }
        } catch(err){
            showAlert('Ошибка редактирования','error');
        }
    }

    async function deleteOption(id){
        if(!confirm('Удалить вариант?')) return;
        try{
            const res = await fetch(`/api/options/${id}`,{method:'DELETE'});
            if(res.ok){
                loadOptions(selectedQuestionId);
                showAlert('Вариант удален');
            } else {
                const err = await res.text();
                showAlert(err,'error');
            }
        } catch(err){
            showAlert('Ошибка удаления','error');
        }
    }

    loadQuestions();
</script>
</body>
</html>
